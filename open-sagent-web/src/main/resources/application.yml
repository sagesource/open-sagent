server:
  port: 8080

spring:
  application:
    name: open-sagent-web

  datasource:
    url: jdbc:sqlite:${WEB_DB_PATH:./open-sagent-web.db}
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true

# Sagent Agent配置
sagent:
  # LLM配置
  llm:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    model: ${OPENAI_MODEL:gpt-4o-mini}
  # Agent配置
  agent:
    # SimpleAgent配置
    simple:
      temperature: ${SIMPLE_AGENT_TEMPERATURE:0.7}
      max-tokens: ${SIMPLE_AGENT_MAX_TOKENS:2048}
    # ReActAgent配置
    smart:
      temperature: ${SMART_AGENT_TEMPERATURE:0.7}
      max-tokens: ${SMART_AGENT_MAX_TOKENS:4096}
      max-iterations: ${SMART_AGENT_MAX_ITERATIONS:10}
  # 标题生成Agent配置
  title-agent:
    temperature: ${TITLE_AGENT_TEMPERATURE:0.5}
    max-tokens: ${TITLE_AGENT_MAX_TOKENS:100}
  # JWT配置
  jwt:
    secret: ${JWT_SECRET:open-sagent-default-secret-key-2026}
    expire-hours: ${JWT_EXPIRE_HOURS:24}

# 日志
logging:
  level:
    ai.sagesource.opensagent: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
