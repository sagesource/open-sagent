server:
  port: 8080

spring:
  application:
    name: open-sagent-web

  datasource:
    url: jdbc:sqlite:${WEB_DB_PATH:./open-sagent-web.db}
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true

# Sagent Agent配置
sagent:
  # 全局默认LLM配置（作为各Agent的fallback默认值）
  llm:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:}
    model: ${OPENAI_AGENT_MODEL:}

  # Agent配置（每个Agent可独立配置LLM参数）
  agent:
    simple:
      model: ${SIMPLE_AGENT_MODEL:}
      api-key: ${SIMPLE_AGENT_API_KEY:}
      base-url: ${SIMPLE_AGENT_BASE_URL:}
      temperature: ${SIMPLE_AGENT_TEMPERATURE:0.7}
      max-tokens: ${SIMPLE_AGENT_MAX_TOKENS:2048}
      # Prompt配置
      prompt-path: ${SIMPLE_PROMPT_PATH:prompts/simple-agent.txt}
      prompt-vars:
        role: ${SIMPLE_PROMPT_ROLE:AI助手}

    smart:
      model: ${SMART_AGENT_MODEL:}
      api-key: ${SMART_AGENT_API_KEY:}
      base-url: ${SMART_AGENT_BASE_URL:}
      temperature: ${SMART_AGENT_TEMPERATURE:0.7}
      max-tokens: ${SMART_AGENT_MAX_TOKENS:4096}
      max-iterations: ${SMART_AGENT_MAX_ITERATIONS:10}
      # Prompt配置
      prompt-path: ${SMART_PROMPT_PATH:prompts/smart-agent.txt}
      prompt-vars:
        role: ${SMART_PROMPT_ROLE:智能AI助手}

    title:
      model: ${TITLE_AGENT_MODEL:}
      api-key: ${TITLE_AGENT_API_KEY:}
      base-url: ${TITLE_AGENT_BASE_URL:}
      temperature: ${TITLE_AGENT_TEMPERATURE:0.5}
      max-tokens: ${TITLE_AGENT_MAX_TOKENS:100}
      # Prompt配置
      prompt-path: ${TITLE_PROMPT_PATH:prompts/title-agent.txt}
      prompt-vars:
        max-length: ${TITLE_PROMPT_MAX_LENGTH:10}
  # JWT配置
  jwt:
    secret: ${JWT_SECRET:open-sagent-default-secret-key-2026}
    expire-hours: ${JWT_EXPIRE_HOURS:24}

# 日志
logging:
  level:
    ai.sagesource.opensagent: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
